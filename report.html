<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NTHU Housing Results</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, "Noto Sans TC", "Helvetica Neue", sans-serif;
        background: #0f1117;
        color: #e0e0e0;
        padding: 24px;
        max-width: 900px;
        margin: 0 auto;
    }
    h1 {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 6px;
        color: #fff;
    }
    .subtitle {
        color: #888;
        font-size: 0.85rem;
        margin-bottom: 20px;
    }
    .filters {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .filter-btn {
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid #333;
        background: #1a1d27;
        color: #ccc;
        cursor: pointer;
        font-size: 0.8rem;
        transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
        background: #2563eb;
        border-color: #2563eb;
        color: #fff;
    }
    .search {
        width: 100%;
        padding: 10px 16px;
        border-radius: 10px;
        border: 1px solid #333;
        background: #1a1d27;
        color: #e0e0e0;
        font-size: 0.9rem;
        margin-bottom: 16px;
        outline: none;
    }
    .search:focus { border-color: #2563eb; }
    .search::placeholder { color: #555; }
    .count { color: #888; font-size: 0.8rem; margin-bottom: 12px; }
    .card {
        background: #1a1d27;
        border: 1px solid #262a36;
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 12px;
        transition: border-color 0.15s;
    }
    .card:hover { border-color: #2563eb; }
    .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        flex-wrap: wrap;
    }
    .idx { color: #555; font-size: 0.75rem; font-weight: 600; }
    .tag-rent {
        background: #166534;
        color: #4ade80;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 0.7rem;
        font-weight: 600;
    }
    .tag-seek {
        background: #1e3a5f;
        color: #60a5fa;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 0.7rem;
        font-weight: 600;
    }
    .tag-none {
        background: #333;
        color: #888;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 0.7rem;
    }
    .price {
        font-size: 1.15rem;
        font-weight: 700;
    }
    .people {
        color: #aaa;
        font-size: 0.85rem;
    }
    .card-body { padding-left: 2px; }
    .meta {
        display: flex;
        gap: 16px;
        color: #aaa;
        font-size: 0.8rem;
        margin-bottom: 6px;
        flex-wrap: wrap;
    }
    .location {
        color: #93c5fd;
        font-size: 0.85rem;
        margin-bottom: 6px;
    }
    .details {
        list-style: none;
        padding: 0;
        margin-top: 8px;
    }
    .details li {
        color: #888;
        font-size: 0.78rem;
        padding: 1px 0;
        border-left: 2px solid #333;
        padding-left: 10px;
        margin-bottom: 2px;
    }
    .card-link {
        display: inline-block;
        margin-top: 10px;
        color: #60a5fa;
        text-decoration: none;
        font-size: 0.8rem;
    }
    .card-link:hover { text-decoration: underline; }
    .distance {
        display: flex;
        gap: 12px;
        font-size: 0.8rem;
        margin-left: auto;
    }
    .dist-walk { color: #a5d6a7; }
    .dist-bike { color: #90caf9; }
    .hidden { display: none; }
    .sort-bar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
        font-size: 0.8rem;
        color: #888;
    }
</style>
</head>
<body>
    <h1>🏠 NTHU Housing — 清大租屋版</h1>
    <p class="subtitle">0 listings | Filters: 出租 only | walk ≤ 60 min</p>

    <input class="search" type="text" placeholder="Search by keyword... (e.g. 套房, 金山, 清大, 可租補)" id="search">

    <div class="filters">
        <button class="filter-btn active" onclick="filterType('all')">All</button>
        <button class="filter-btn" onclick="filterType('出租')">出租 For Rent</button>
        <button class="filter-btn" onclick="filterType('求租')">求租 Looking</button>
    </div>
    <div class="sort-bar">
        Sort:
        <button class="filter-btn active" onclick="sortCards('default')">Default</button>
        <button class="filter-btn" onclick="sortCards('price-asc')">Price ↑</button>
        <button class="filter-btn" onclick="sortCards('price-desc')">Price ↓</button>
        <button class="filter-btn" onclick="sortCards('walk')">🚶 Walk</button>
        <button class="filter-btn" onclick="sortCards('bike')">🚲 Bike</button>
    </div>
    <div class="count" id="count"></div>

    <div id="cards">
        
    </div>

<script>
const cards = document.querySelectorAll('.card');
const searchInput = document.getElementById('search');
const countEl = document.getElementById('count');
let activeType = 'all';

function updateCount() {
    const visible = document.querySelectorAll('.card:not(.hidden)').length;
    countEl.textContent = visible + ' / ' + cards.length + ' shown';
}

function applyFilters() {
    const q = searchInput.value.toLowerCase();
    cards.forEach(card => {
        const text = card.textContent.toLowerCase();
        const type = card.dataset.type;
        const matchType = activeType === 'all' || type === activeType;
        const matchSearch = !q || text.includes(q);
        card.classList.toggle('hidden', !(matchType && matchSearch));
    });
    updateCount();
}

function filterType(type) {
    activeType = type;
    document.querySelectorAll('.filters .filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    applyFilters();
}

function sortCards(mode) {
    const container = document.getElementById('cards');
    const arr = Array.from(cards);
    document.querySelectorAll('.sort-bar .filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    arr.sort((a, b) => {
        if (mode === 'price-asc') return (parseInt(a.dataset.price)||999999) - (parseInt(b.dataset.price)||999999);
        if (mode === 'price-desc') return (parseInt(b.dataset.price)||0) - (parseInt(a.dataset.price)||0);
        if (mode === 'walk') return (parseInt(a.dataset.walk)||999999) - (parseInt(b.dataset.walk)||999999);
        if (mode === 'bike') return (parseInt(a.dataset.bike)||999999) - (parseInt(b.dataset.bike)||999999);
        return 0;
    });
    arr.forEach(c => container.appendChild(c));
}

searchInput.addEventListener('input', applyFilters);
updateCount();
</script>
</body>
</html>
